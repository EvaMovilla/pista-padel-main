<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PadelNow | Perfil</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
  <a href="mis-reservas.html" class="logo-container" style="text-decoration: none;">
    <img src="img/Logo.png" alt="Logo de PadelNow">

    <div class="brand-text">
      <h1>PadelNow</h1>
      <p class="subtitle">Área de Jugador</p>
    </div>
  </a>

  <nav class="top-nav">
    <a href="pistas.html" class="nav-link">Pistas</a>
    <a href="mis-reservas.html" class="nav-link">Mis Reservas</a>
    <a href="reserva.html" class="nav-link">Nueva Reserva</a>
    <a href="profile.html" class="nav-link">Mi Perfil</a>
    <a href="login.html" class="nav-link" style="color: #ef4444;">Salir</a>
  </nav>
</header>

<main class="main-login">
  <section class="login-container">

    <div class="message">
      <p>Gestiona tu información personal</p>
    </div>

    <div class="profile-avatar">
      <img src="img/Avatar.png" alt="Avatar usuario">
    </div>

    <form id="profileForm">

      <div class="form-group">
        <label for="name">Nombre</label>

        <input
                type="text"
                id="name"
                required
        >
      </div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>

        <input
                type="email"
                id="email"
                required
        >
      </div>

      <div class="form-group">
        <label for="phone">Teléfono</label>

        <input
                type="tel"
                id="phone"
                required
        >
      </div>

      <button type="submit" class="btn">
        Guardar cambios
      </button>

    </form>

    <a href="login.html" class="btn logout-btn">
      Cerrar sesión
    </a>

  </section>
</main>

<!-- VALIDACIONES QA -->
<script>
  document.addEventListener("DOMContentLoaded", function () {

    const form = document.getElementById("profileForm");

    form.addEventListener("submit", function (event) {

      const nombre = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const telefono = document.getElementById("phone").value.trim();

      const telefonoRegex = /^[0-9]{9}$/;
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      // Validación nombre
      if (nombre.length < 3) {
        event.preventDefault();
        alert("El nombre debe tener al menos 3 caracteres.");
        return;
      }

      // Validación email
      if (!emailRegex.test(email)) {
        event.preventDefault();
        alert("Introduce un correo electrónico válido.");
        return;
      }

      // Validación teléfono
      if (!telefonoRegex.test(telefono)) {
        event.preventDefault();
        alert("El teléfono debe tener exactamente 9 números.");
        return;
      }

      alert("Perfil validado correctamente.");
    });

  });
</script>

</body>
</html>
